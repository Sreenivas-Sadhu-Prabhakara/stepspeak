<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  :root {
    --ivory:  #FBFBF7;
    --ivory-2:#F2F2EA;
    --indigo: #1F2450;
    --indigo-2:#3A3F73;
    --slate:  #565B86;
    --coral:  #F2635A;
    --coral-ink:#8C231C;
    --line:   #D8D8CD;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(780px 420px at 90% -20%, rgba(242,99,90,0.14), transparent 62%),
      var(--ivory);
    font-family: var(--sans);
    color: var(--indigo);
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    position: absolute; inset: 0;
    padding: 78px 84px;
    display: flex; flex-direction: column; justify-content: space-between;
  }

  /* brand */
  .brand { display: flex; align-items: center; gap: 20px; }
  .mark { width: 74px; height: 74px; }
  .wordmark {
    font-size: 44px; font-weight: 800; letter-spacing: -0.03em; color: var(--indigo);
  }

  .middle { display: flex; align-items: center; gap: 56px; }
  .headline { max-width: 640px; }
  .eyebrow {
    font-size: 20px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.16em; color: var(--slate);
  }
  .headline h1 {
    margin-top: 18px;
    font-size: 66px; font-weight: 800; letter-spacing: -0.03em;
    line-height: 1.08; color: var(--indigo);
  }
  .headline .accent { color: var(--coral-ink); }

  /* the signature: a speech bubble showing "Step 3 of 8" */
  .bubble {
    position: relative;
    flex: none;
    width: 340px;
    background: #fff;
    border: 3px solid var(--line);
    border-radius: 30px;
    padding: 42px 36px 46px;
    box-shadow: 0 40px 80px -50px rgba(31,36,80,0.6);
  }
  .bubble::after {
    content: "";
    position: absolute; left: 60px; bottom: -22px;
    width: 46px; height: 26px;
    background: #fff;
    border-right: 3px solid var(--line);
    border-bottom: 3px solid var(--line);
    border-bottom-right-radius: 8px;
    transform: skewX(-24deg);
  }
  .bubble .chip {
    position: absolute; top: -30px; left: 34px;
    min-width: 64px; height: 64px; padding: 0 16px;
    border-radius: 18px;
    background: var(--coral);
    color: #33100c;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 34px; font-weight: 800;
    box-shadow: 0 16px 30px -16px rgba(31,36,80,0.7);
  }
  .bubble .count {
    font-size: 19px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.14em; color: var(--slate);
  }
  .bubble .step {
    margin-top: 14px;
    font-size: 40px; font-weight: 700; line-height: 1.2; color: var(--indigo);
    letter-spacing: -0.015em;
  }

  .chips { display: flex; align-items: center; gap: 14px; }
  .pill {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 13px 22px;
    border: 2px solid var(--line);
    border-radius: 999px;
    background: var(--ivory-2);
    font-size: 23px; font-weight: 700; color: var(--indigo-2);
  }
  .pill .dot { width: 12px; height: 12px; border-radius: 50%; }
  .pill .dot--coral { background: var(--coral); box-shadow: 0 0 0 4px rgba(242,99,90,0.16); }
  .pill .dot--indigo { background: var(--indigo); box-shadow: 0 0 0 4px rgba(31,36,80,0.12); }
</style>
</head>
<body>
  <div class="frame">
    <div class="brand">
      <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
        <rect width="48" height="48" rx="11" fill="#1F2450"/>
        <path d="M11 13h26a3 3 0 0 1 3 3v13a3 3 0 0 1-3 3H21l-8 7v-7h-2a3 3 0 0 1-3-3V16a3 3 0 0 1 3-3z" fill="#FBFBF7"/>
        <circle cx="18" cy="22.5" r="2.4" fill="#F2635A"/>
        <circle cx="24" cy="22.5" r="2.4" fill="#1F2450"/>
        <circle cx="30" cy="22.5" r="2.4" fill="#1F2450"/>
      </svg>
      <span class="wordmark">stepspeak</span>
    </div>

    <div class="middle">
      <div class="headline">
        <p class="eyebrow">Spoken &middot; one step at a time</p>
        <h1>Hear any instructions,<br><span class="accent">one step at a time.</span></h1>
      </div>

      <div class="bubble">
        <span class="chip">3</span>
        <p class="count">Step 3 of 8</p>
        <p class="step">Pour the hot water into the mug and stir.</p>
      </div>
    </div>

    <div class="chips">
      <span class="pill"><span class="dot dot--coral"></span>hands-free</span>
      <span class="pill"><span class="dot dot--indigo"></span>big print</span>
      <span class="pill"><span class="dot dot--coral"></span>private &amp; offline</span>
    </div>
  </div>
</body>
</html>
